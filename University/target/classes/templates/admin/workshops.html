<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin — Workshops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Admin: Workshops</h2>
        <a href="/admin/workshops/new" class="btn btn-success">+ Create New Workshop</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow">
        <table class="table table-bordered table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Start Time</th>
                <th>Seats</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="workshop : ${workshops}">
                <td th:text="${workshop.title}"></td>
                <td th:text="${#temporals.format(workshop.startDatetime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${workshop.seatsRemaining + '/' + workshop.totalSeats}"></td>
                <td>
                        <span class="badge bg-success"
                              th:if="${workshop.status == 'ACTIVE'}">ACTIVE</span>
                    <span class="badge bg-danger"
                          th:if="${workshop.status == 'CANCELLED'}">CANCELLED</span>
                </td>
                <td>
                    <a th:href="@{/admin/workshops/{id}/edit(id=${workshop.id})}"
                       class="btn btn-warning btn-sm">Edit</a>

                    <form th:action="@{/admin/workshops/{id}/cancel(id=${workshop.id})}"
                          method="post" style="display:inline"
                          th:if="${workshop.status == 'ACTIVE'}">
                        <button class="btn btn-danger btn-sm" type="submit"
                                onclick="return confirm('Cancel this workshop?')">
                            Cancel
                        </button>
                    </form>

                    <a th:href="@{/admin/workshops/{id}/registrations(id=${workshop.id})}"
                       class="btn btn-info btn-sm">Regs</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
