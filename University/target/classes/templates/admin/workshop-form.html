<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin — Workshop Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow p-4">
        <h3 class="mb-4">Admin: Workshop Form</h3>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="${workshopId != null ?
                '/admin/workshops/' + workshopId + '/edit' :
                '/admin/workshops/new'}"
              method="post"
              th:object="${workshopForm}">

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" type="text"
                       th:field="*{title}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="3"
                          th:field="*{description}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input class="form-control" type="text"
                       th:field="*{location}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Start Date and Time</label>
                <input class="form-control" type="datetime-local"
                       th:field="*{startDatetime}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Total Seats</label>
                <input class="form-control" type="number"
                       th:field="*{totalSeats}" min="1" required/>
            </div>

            <button class="btn btn-primary" type="submit">Save</button>
            <a href="/admin/workshops" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
