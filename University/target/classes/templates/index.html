<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <title>U-WRS — Workshops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Workshops (Upcoming)</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(workshops)}" class="alert alert-info">
        No workshops available at this time.
    </div>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="workshop : ${workshops}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${workshop.title}"></h5>
                    <p class="card-text">
                        <strong>Date and Time:</strong>
                        <span th:text="${#temporals.format(workshop.startDatetime, 'yyyy-MM-dd HH:mm')}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Location:</strong>
                        <span th:text="${workshop.location}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Seats Remaining:</strong>
                        <span th:text="${workshop.seatsRemaining}"></span>
                    </p>
                    <span class="badge bg-success"
                          th:if="${workshop.status == 'ACTIVE'}">ACTIVE</span>
                    <span class="badge bg-danger"
                          th:if="${workshop.status == 'CANCELLED'}">CANCELLED</span>
                </div>
                <div class="card-footer">
                    <a th:href="@{/workshops/{id}(id=${workshop.id})}"
                       class="btn btn-primary btn-sm">View Details</a>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
