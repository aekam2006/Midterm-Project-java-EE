<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">U-WRS</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item"
                    th:if="${#authorization.expression('isAuthenticated()')}">
                    <a class="nav-link" href="/my/registrations">My Registrations</a>
                </li>
                <li class="nav-item"
                    th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link" href="/admin/workshops">Admin</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item d-flex align-items-center text-white me-3"
                    th:if="${#authorization.expression('isAuthenticated()')}">
                    <span class="fw-semibold">
                        Hello, <span th:text="${#authentication.name}"></span>
                    </span>
                </li>
                <li class="nav-item"
                    th:if="${#authorization.expression('isAuthenticated()')}">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-light btn-sm">Logout</button>
                    </form>
                </li>
                <li class="nav-item"
                    th:if="${#authorization.expression('!isAuthenticated()')}">
                    <a class="btn btn-light btn-sm" href="/login">Login</a>
                </li>
                <li class="nav-item ms-2"
                    th:if="${#authorization.expression('!isAuthenticated()')}">
                    <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
