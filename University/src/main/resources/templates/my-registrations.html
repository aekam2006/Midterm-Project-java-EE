<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Registrations — U-WRS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">My Registrations</h2>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div th:if="${#lists.isEmpty(registrations)}" class="alert alert-info">
    You have no registrations yet. <a href="/">Browse workshops</a>
  </div>

  <div class="card shadow" th:if="${!#lists.isEmpty(registrations)}">
    <table class="table table-bordered table-hover mb-0">
      <thead class="table-dark">
      <tr>
        <th>Workshop</th>
        <th>Date/Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="reg : ${registrations}">
        <td th:text="${reg.workshop.title}"></td>
        <td th:text="${#temporals.format(reg.workshop.startDatetime, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
                        <span class="badge bg-success"
                              th:if="${reg.status == 'ACTIVE'}">ACTIVE</span>
          <span class="badge bg-secondary"
                th:if="${reg.status == 'CANCELLED'}">CANCELLED</span>
        </td>
        <td>
          <form th:if="${reg.status == 'ACTIVE'}"
                th:action="@{/registrations/{id}/cancel(id=${reg.id})}"
                method="post">
            <button class="btn btn-danger btn-sm" type="submit">Cancel</button>
          </form>
          <span th:if="${reg.status == 'CANCELLED'}" class="text-muted">—</span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <a href="/" class="btn btn-secondary mt-3">Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
